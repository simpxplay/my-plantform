services:
  vite:
    image: node:22-alpine
    working_dir: /var/www/html/web
    # Install deps (uses host node_modules if present) then start Vite
    command: sh -c "npm install --prefer-offline 2>/dev/null; npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - "../:/var/www/html:cached"
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      - NODE_ENV=development
      # Points Vite proxy target to the ddev web container (internal network)
      - VITE_BACKEND_URL=http://web
    labels:
      com.ddev.site-name: ${DDEV_SITENAME}
      com.ddev.approot: ${DDEV_APPROOT}
    restart: unless-stopped
